    <circle cx="622" cy="95" r="18" fill="#ff6600"
      style="animation: exp2 15s linear infinite; transform-box: fill-box; transform-origin: center center; opacity:0;"/>
  

  <g style="animation: walkRight 15s linear infinite; transform-box: fill-box; transform-origin: 0 0;">
