name: John Wick Kills Repos
on:
  schedule:
    - cron: '0 */6 * * *'  # a cada 6h
  workflow_dispatch:   # manual também
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate SVG
        uses: actions/github-script@v7
        with:
          script: |
            const repos = await github.rest.repos
              .listForAuthenticatedUser({
                sort: 'updated', per_page: 8
              });
            const names = repos.data.map(r => r.name);
            const fs = require('fs');
            const svg = generateWickSVG(names);
            fs.writeFileSync('assets/john-wick.svg', svg);
          
      - name: Commit SVG
        run: |
          git config user.name "John Wick Bot"
          git config user.email "wick@continental.com"
          git add assets/john-wick.svg
          git diff --staged --quiet || git commit \
            -m "🔫 Wick eliminou mais repos"
          git push
