name: 🔫 John Wick Kills Repos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-wick-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar SVG com repos reais
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            let repos = [];

            try {
              const response = await github.rest.repos.listForUser({
                username: owner,
                sort: 'updated',
                per_page: 5
              });
              repos = response.data;
            } catch (error) {
              const response = await github.rest.repos.listForOrg({
                org: owner,
                sort: 'updated',
                per_page: 5
              });
              repos = response.data;
            }

            const selectedRepos = repos.filter(r => !r.fork).slice(0, 5);
            const totalKills = selectedRepos.length;

            const slots = [
              { x: 740, w: 64, cx: 772, color: '#7ec8e3' },
              { x: 590, w: 64, cx: 622, color: '#a8cc8c' },
              { x: 440, w: 64, cx: 472, color: '#e06c75' },
              { x: 290, w: 64, cx: 322, color: '#c9a84c' },
              { x: 140, w: 70, cx: 175, color: '#c084fc' }
            ];

            const shots = [10, 25, 40, 55, 70];

            const repoBlocks = selectedRepos.map((repo, i) => {
              const slot = slots[i];
              const shortName = repo.name.length > 9 ? repo.name.slice(0, 8) + '…' : repo.name;

              return `
                <g style="animation: fall${i + 1} 15s linear infinite; transform-box: fill-box; transform-origin: center bottom;">
                  <rect x="${slot.x}" y="78" width="${slot.w}" height="34" fill="#0d1117" stroke="${slot.color}" stroke-width="1" rx="4"/>
                  <text x="${slot.cx}" y="92" text-anchor="middle" style="font:10px monospace;fill:${slot.color};">📁</text>
                  <text x="${slot.cx}" y="107" text-anchor="middle" class="repo-label">${shortName}</text>
                </g>
                <circle cx="${slot.cx}" cy="95" r="18" fill="#ff6600"
                  style="animation: exp${i + 1} 15s linear infinite; transform-box: fill-box; transform-origin: center center; opacity:0;"/>
              `;
            }).join('\n');

            const shotEffects = selectedRepos.map((_, i) => {
              return `
                <g transform="translate(55,75)">
                  <rect width="12" height="2" rx="1" fill="#c9a84c"
                    style="animation: bullet${i + 1} 15s linear infinite; transform-box: fill-box; transform-origin: left center; opacity:0;"/>
                  <circle cx="4" cy="1" r="4" fill="#ffdd44"
                    style="animation: muzzle${i + 1} 15s linear infinite; opacity:0;"/>
                </g>
              `;
            }).join('\n');

            const styleBlocks = [
              '@keyframes walkRight { 0% { transform: translateX(0px); } 100% { transform: translateX(820px); } }',
              '@keyframes legL { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(18deg); } 75% { transform: rotate(-18deg); } }',
              '@keyframes legR { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-18deg); } 75% { transform: rotate(18deg); } }',
              '.repo-label { font: bold 8px monospace; fill: #aaa; }',
              '.counter-label { font: bold 9px monospace; fill: #666; letter-spacing:1px; }',
              '.counter-num { font: bold 20px monospace; fill: #c9a84c; }',
              '.title-txt { font: bold 13px monospace; fill: #c9a84c; letter-spacing:2px; }'
            ];

            for (let i = 0; i < selectedRepos.length; i++) {
              const shot = shots[i];
              const hit = shot + 2;
              const fall = shot + 3;
              const disappear = fall + 6;

              styleBlocks.push(`
                @keyframes fall${i + 1} {
                  0%, ${hit}% { transform: scaleY(1); opacity: 1; }
                  ${fall}%, 100% { transform: scaleY(0); opacity: 0; }
                }
              `);

              styleBlocks.push(`
                @keyframes exp${i + 1} {
                  0%, ${hit}% { opacity: 0; transform: scale(0); }
                  ${fall}% { opacity: 1; transform: scale(0); }
                  ${disappear}%, 100% { opacity: 0; transform: scale(2); }
                }
              `);

              styleBlocks.push(`
                @keyframes bullet${i + 1} {
                  0%, ${shot - 1}% { opacity: 0; transform: translateX(0px); }
                  ${shot}% { opacity: 1; transform: translateX(0px); }
                  ${shot + 1}% { opacity: 1; transform: translateX(96px); }
                  ${shot + 2}%, 100% { opacity: 0; transform: translateX(96px); }
                }
              `);

              styleBlocks.push(`
                @keyframes muzzle${i + 1} {
                  0%, ${shot - 1}% { opacity: 0; transform: scale(0.2); }
                  ${shot}% { opacity: 1; transform: scale(1); }
                  ${shot + 1}%, 100% { opacity: 0; transform: scale(0.2); }
                }
              `);
            }

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 130" width="100%">
              <style>
                ${styleBlocks.join('\n')}
              </style>

              <rect width="900" height="130" fill="#0a0a0a" rx="12"/>
              <text x="16" y="18" class="title-txt">// JOHN WICK · ELIMINATING REPOS</text>
              <text x="780" y="18" class="counter-label">KILLS</text>
              <text x="840" y="18" class="counter-num">${totalKills}</text>

              <line x1="0" y1="112" x2="900" y2="112" stroke="#2a2a2a" stroke-width="1"/>

              ${repoBlocks}

              <g style="animation: walkRight 15s linear infinite; transform-box: fill-box; transform-origin: 0 0;">
                <rect x="18" y="72" width="14" height="20" fill="#111" rx="2"/>
                <circle cx="25" cy="65" r="8" fill="#e8d5b0"/>
                <rect x="18" y="58" width="14" height="5" fill="#1a0a00" rx="2"/>
                <rect x="21" y="63" width="2" height="2" fill="#222" rx="1"/>
                <rect x="27" y="63" width="2" height="2" fill="#222" rx="1"/>
                <rect x="23" y="72" width="4" height="14" fill="#c9a84c" rx="1"/>
                <rect x="32" y="74" width="12" height="4" fill="#111" rx="1"/>
                <rect x="42" y="72" width="10" height="7" fill="#555" rx="1"/>
                <rect x="50" y="73" width="5" height="3" fill="#333" rx="1"/>
                <polygon points="55,73 62,75 55,77" fill="#ffdd44" style="animation: muzzle1 15s linear infinite; opacity:0;"/>
                <rect x="19" y="91" width="6" height="21" fill="#0d0d0d" rx="2" style="animation: legL 0.4s linear infinite; transform-origin: 22px 91px;"/>
                <rect x="27" y="91" width="6" height="21" fill="#0d0d0d" rx="2" style="animation: legR 0.4s linear infinite; transform-origin: 30px 91px;"/>

                ${shotEffects}
              </g>

              <text x="16" y="126" style="font:8px monospace;fill:#333;letter-spacing:1px;">juliocmsantos-dev · github.com/juliocmsantos-dev · updated by github actions</text>
            </svg>`;

            fs.mkdirSync('assets', { recursive: true });
            fs.writeFileSync('assets/john-wick.svg', svg);
            console.log('SVG gerado com repos:', selectedRepos.map(r => r.name));

      - name: Commit e push do SVG
        run: |
          git config user.name  "John Wick Bot 🔫"
          git config user.email "wick@continental.hotel"
          git add assets/john-wick.svg
          git diff --staged --quiet || git commit -m "🔫 Wick eliminou mais repos [skip ci]"
          git push
