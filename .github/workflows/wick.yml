name: 🔫 John Wick Kills Repos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

# 🔥 PERMISSÃO GLOBAL (mais confiável)
permissions:
  contents: write

jobs:
  generate-wick-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # 🔥 importante pro push funcionar

      - name: Gerar SVG com repos reais
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { data: repos } = await github.rest.repos.listForAuthenticatedUser({
              sort: 'updated',
              per_page: 5,
              type: 'owner'
            });

            if (!repos || repos.length === 0) {
              console.log("Nenhum repositório encontrado.");
              return;
            }

            const repoNames = repos.map(r => r.name);
            const colors = ['#7ec8e3', '#a8cc8c', '#e06c75', '#c9a84c', '#c084fc'];

            const positions = [740, 590, 440, 290, 140];
            const widths    = [64,  64,  64,  64,  70];
            const centers   = [772, 622, 472, 322, 175];

            const repoBlocks = repoNames.map((name, i) => {
              const shortName = name.length > 9 ? name.slice(0, 8) + '…' : name;
              const fallAnim  = `fall${5 - i}`;
              const expAnim   = `exp${5 - i}`;
              const cx        = centers[i];
              const px        = positions[i];
              const w         = widths[i];
              const color     = colors[i];
              return `
              <g style="animation: ${fallAnim} 15s linear infinite; transform-origin: ${cx}px 112px;">
                <rect x="${px}" y="78" width="${w}" height="34" fill="#0d1117" stroke="${color}" stroke-width="1" rx="4"/>
                <text x="${cx}" y="92" text-anchor="middle" style="font:10px monospace;fill:${color};">📁</text>
                <text x="${cx}" y="107" text-anchor="middle" class="repo-label">${shortName}</text>
              </g>
              <circle cx="${cx}" cy="95" r="18" fill="#ff6600"
                style="animation: ${expAnim} 15s linear infinite; transform-origin: ${cx}px 95px; opacity:0;"/>`;
            }).join('\n');

            const svg = `...` // (mantive igual ao seu pra não poluir aqui)

            fs.mkdirSync('assets', { recursive: true });
            fs.writeFileSync('assets/john-wick.svg', svg);

            console.log('SVG gerado com repos:', repoNames);

      - name: Commit e push do SVG
        run: |
          git config user.name  "John Wick Bot 🔫"
          git config user.email "wick@continental.hotel"

          git add assets/john-wick.svg

          if git diff --staged --quiet; then
            echo "Nenhuma mudança para commit."
          else
            git commit -m "🔫 Wick eliminou mais repos [skip ci]"
            git push
          fi
